<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f6f5a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#05261e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#a8894d" stroke-width="0.4" stroke-opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#05261e"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#d9b35d" stroke-width="1.5" stroke-opacity="0.3" rx="14"/>

  <!-- Corner accents — top left -->
  <rect x="36" y="36" width="48" height="2" fill="#d9b35d" opacity="0.55"/>
  <rect x="36" y="36" width="2" height="48" fill="#d9b35d" opacity="0.55"/>
  <!-- top right -->
  <rect x="1116" y="36" width="48" height="2" fill="#d9b35d" opacity="0.55"/>
  <rect x="1162" y="36" width="2" height="48" fill="#d9b35d" opacity="0.55"/>
  <!-- bottom left -->
  <rect x="36" y="592" width="48" height="2" fill="#d9b35d" opacity="0.55"/>
  <rect x="36" y="546" width="2" height="48" fill="#d9b35d" opacity="0.55"/>
  <!-- bottom right -->
  <rect x="1116" y="592" width="48" height="2" fill="#d9b35d" opacity="0.55"/>
  <rect x="1162" y="546" width="2" height="48" fill="#d9b35d" opacity="0.55"/>

  <!-- Ghost tile decorations -->
  <text x="68" y="340" font-family="serif" font-size="160" fill="#d9b35d" opacity="0.055">🀄</text>
  <text x="960" y="260" font-family="serif" font-size="130" fill="#d9b35d" opacity="0.05">🀇</text>
  <text x="1040" y="530" font-family="serif" font-size="100" fill="#d9b35d" opacity="0.045">🀙</text>
  <text x="30" y="570" font-family="serif" font-size="110" fill="#d9b35d" opacity="0.045">🀅</text>

  <!-- Eyebrow label -->
  <text x="600" y="218" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15"
        fill="#35a686" letter-spacing="6" opacity="0.95">THE MAHJONG KNOWLEDGE HUB</text>

  <!-- Main wordmark -->
  <text x="600" y="345" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="114" font-weight="700" fill="#d9b35d">Mahjo</text>

  <!-- Divider -->
  <line x1="430" y1="382" x2="770" y2="382" stroke="#d9b35d" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="432" text-anchor="middle"
        font-family="system-ui, -apple-system, Helvetica, sans-serif"
        font-size="22" fill="#e8d8a7" opacity="0.82"
        letter-spacing="1">Strategy · Rules · Variants · Community</text>

  <!-- URL pill -->
  <rect x="466" y="488" width="268" height="46" rx="23"
        fill="#d9b35d" fill-opacity="0.1"
        stroke="#d9b35d" stroke-width="1" stroke-opacity="0.38"/>
  <text x="600" y="517" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="17" fill="#d9b35d" letter-spacing="3" opacity="0.9">mahjo.app</text>
</svg>
